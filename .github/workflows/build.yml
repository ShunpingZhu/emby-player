name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 编译
        run: npm run build

      - name: 打包 Windows 安装包
        run: npx electron-builder --win --x64

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Emby-Player-win32-x64
          path: release/
          retention-days: 7
