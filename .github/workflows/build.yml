name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: true

      - name: Build distribution
        if: matrix.platform != 'darwin' || startsWith(matrix.platform, 'darwin')
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            npm run build:win
          elif [ "${{ matrix.platform }}" = "darwin" ]; then
            npm run build:mac
          else
            npm run build:linux
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            release/*
            out/*
          retention-days: 7
